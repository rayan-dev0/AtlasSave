name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Determine tag name and check existence
        id: check_tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            TAG_EXISTS="true"
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG_NAME="v$VERSION"
            
            git fetch --tags
            if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists. Skipping build."
              TAG_EXISTS="true"
            else
              echo "Tag $TAG_NAME does not exist. Proceeding with release build."
              TAG_EXISTS="false"
            fi
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "tag_exists=$TAG_EXISTS" >> $GITHUB_OUTPUT

      - name: Build and Publish Tauri app
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || steps.check_tag.outputs.tag_exists == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.check_tag.outputs.tag_name }}
          releaseName: 'AtlasSave ${{ steps.check_tag.outputs.tag_name }}'
          releaseBody: 'AtlasSave Desktop Application Release ${{ steps.check_tag.outputs.tag_name }}'
          releaseDraft: true
          prerelease: false
          uploadPlainBinary: true
          args: ${{ matrix.args }}

      - name: Compress portable binary
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || steps.check_tag.outputs.tag_exists == 'false'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/AtlasSave.exe -DestinationPath src-tauri/target/release/AtlasSave-portable-windows-x64.zip

      - name: Upload portable zip to GitHub Release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_tag.outputs.tag_name }}
          files: src-tauri/target/release/AtlasSave-portable-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
